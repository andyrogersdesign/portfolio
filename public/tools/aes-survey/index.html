    <script>window.__COURSE__ = {"id":"aes-demo-feedback","title":"Giving Effective Feedback — Experience Survey","description":"A two-minute survey about the workshop you just completed. There are no right answers; pick the statement that fits you best.","passingScore":1,"completionRule":"finish","authorEmail":"hello@andyrogers.design","authorName":"Andy","lessons":[{"id":"lesson-experience","title":"Your experience","blocks":[{"id":"intro","type":"callout","variant":"info","html":"\u003cp>Thanks for completing the \u003cstrong>Giving Effective Feedback\u003c/strong> workshop. This short survey helps us make it better. There are no right answers, just choose the statement that fits you best.\u003c/p>"},{"id":"q-prepared","type":"survey","surveyKind":"opinion","reference":"prepared-to-apply","prompt":"How well has the workshop prepared you to give feedback in real situations?","options":[{"id":"o1","category":"alarming","text":"I still wouldn't know where to start."},{"id":"o2","category":"concerning","text":"I understand the theory, but I couldn't do it yet without help."},{"id":"o3","category":"acceptable","text":"I could give useful feedback in most situations."},{"id":"o4","category":"superior","text":"I feel ready to give clear, kind feedback in any situation."}]},{"id":"q-relevance","type":"survey","surveyKind":"opinion","reference":"example-relevance","prompt":"How well did the examples reflect the kind of conversations you actually have?","options":[{"id":"o1","category":"alarming","text":"None of them were relevant to my work."},{"id":"o2","category":"concerning","text":"A few were relevant, but most were not."},{"id":"o3","category":"acceptable","text":"Most examples matched situations I recognise."},{"id":"o4","category":"superior","text":"The examples could have been taken straight from my week."}]},{"id":"q-intent","type":"survey","surveyKind":"behaviour","reference":"intended-use","prompt":"Thinking about the next two weeks, what will you do differently?","options":[{"id":"o1","category":"alarming","text":"Honestly, I don't expect to change anything."},{"id":"o2","category":"concerning","text":"I might try one idea if the moment comes up."},{"id":"o3","category":"acceptable","text":"I plan to use a couple of the techniques deliberately."},{"id":"o4","category":"superior","text":"I've already planned a specific conversation to apply this to."}]},{"id":"q-difficult","type":"survey","surveyKind":"behaviour","reference":"approach-to-difficult","prompt":"When you next need to give difficult feedback, how will you approach it?","options":[{"id":"o1","category":"alarming","text":"I'll avoid it, as I usually do."},{"id":"o2","category":"concerning","text":"I'll push through it but expect it to go badly."},{"id":"o3","category":"acceptable","text":"I'll use a structure from the workshop to keep it on track."},{"id":"o4","category":"superior","text":"I'll plan it, use the structure, and follow up afterwards."}]}]}]};</script>
